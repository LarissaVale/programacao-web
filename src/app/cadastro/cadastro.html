<h3>Área de Cadastro</h3>
Para comprar em nossa loja, realize o cadastro abaixo. 
<br>
Caso já tenha, vá para área de login: 
<a href="login/">Login</a>
<br><br>
<div class="input"> 
    Nome: <input type="text" id="nome"  placeholder="digite seu nome completo" />
    <br><br>
    CPF: <input type="text" id="cpf" placeholder="digite seu cpf" />
    <br><br>
    Data de nascimento: <input type="text" id="data" placeholder="data de nascimento" />
    <br><br>
    CEP: <input type="text" id="cep"  placeholder="digite seu cep" />
    <br><br>
    Endereço: <input type="text" id="endereco" placeholder="digite seu endereco" />
    Número: <input type="text" id="numero" placeholder="numero da sua residência" />
    <br><br>
    Email: <input type="text" id="email" placeholder="digite seu email " />
</div>
<br><br><br>
<div class="btn-cadastrar">
    <button (click)="cadastrar()">Cadastrar</button>
</div>
<div class="aviso">
    <h4>{{aviso}}</h4>
</div>
